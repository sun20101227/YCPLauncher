<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YCP 文件上传管理后台</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--orange:#FF5500;--bg:#0A0A0A;--card:rgba(17,24,39,.75);--border:rgba(255,85,0,.18)}
  body{background:var(--bg);color:#f9fafb;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;
       display:flex;align-items:center;justify-content:center;padding:24px}
  /* scanline */
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,85,0,.025) 2px,rgba(255,85,0,.025) 4px)}

  /* ─ Login ─ */
  #login{width:100%;max-width:400px;text-align:center}
  #login .logo{font-size:2rem;font-weight:900;letter-spacing:.15em;color:#fff;margin-bottom:8px}
  #login .logo span{color:var(--orange)}
  #login p{color:#6b7280;font-size:.85rem;margin-bottom:28px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;backdrop-filter:blur(20px)}
  input[type=password]{width:100%;padding:14px 18px;background:rgba(255,85,0,.06);
    border:1px solid var(--border);border-radius:8px;color:#fff;font-size:1rem;outline:none;
    transition:border-color .2s}
  input[type=password]:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,85,0,.15)}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:linear-gradient(135deg,#FF5500,#CC3300);
    color:#fff;font-weight:700;font-size:.9rem;letter-spacing:.06em;border:none;border-radius:6px;
    cursor:pointer;width:100%;justify-content:center;margin-top:12px;
    transition:opacity .2s,transform .15s;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
  .btn:hover{opacity:.88;transform:scale(1.02)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn-sm{width:auto;padding:8px 16px;font-size:.78rem;margin-top:0}
  .btn-del{background:linear-gradient(135deg,#c0392b,#922b21)}

  /* ─ Dashboard ─ */
  #dashboard{width:100%;max-width:760px;display:none;flex-direction:column;gap:24px}
  .topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .topbar .logo{font-size:1.3rem;font-weight:900;letter-spacing:.12em}
  .topbar .logo span{color:var(--orange)}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;
    background:rgba(255,85,0,.1);border:1px solid rgba(255,85,0,.3);border-radius:100px;
    font-size:.7rem;font-weight:700;letter-spacing:.1em;color:var(--orange);text-transform:uppercase}
  .dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;
    animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

  /* ─ Drop zone ─ */
  #dropzone{border:2px dashed rgba(255,85,0,.3);border-radius:12px;padding:48px 24px;
    text-align:center;cursor:pointer;transition:all .25s;background:rgba(255,85,0,.03)}
  #dropzone:hover,#dropzone.drag{border-color:var(--orange);background:rgba(255,85,0,.07);
    box-shadow:0 0 30px rgba(255,85,0,.1)}
  #dropzone .icon{font-size:3rem;margin-bottom:12px}
  #dropzone h3{font-size:1.1rem;font-weight:700;margin-bottom:6px}
  #dropzone p{color:#6b7280;font-size:.85rem}
  #fileInput{display:none}

  /* ─ Progress ─ */
  #progress-area{display:none;flex-direction:column;gap:12px}
  .file-info{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  .file-name{font-weight:700;font-size:.95rem;color:#fff}
  .file-meta{font-size:.78rem;color:#6b7280}
  .prog-track{height:8px;background:rgba(255,85,0,.12);border-radius:99px;overflow:hidden}
  .prog-bar{height:100%;background:linear-gradient(90deg,#FF5500,#FF8844);border-radius:99px;
    width:0%;transition:width .3s ease;box-shadow:0 0 10px rgba(255,85,0,.5)}
  .prog-label{display:flex;justify-content:space-between;font-size:.78rem;color:#6b7280;margin-top:4px}
  #status-msg{padding:12px 16px;border-radius:8px;font-size:.85rem;font-weight:600;display:none}
  .msg-ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22c55e}
  .msg-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444}

  /* ─ File list ─ */
  #file-list{display:flex;flex-direction:column;gap:8px}
  .file-row{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 18px;background:rgba(255,85,0,.04);border:1px solid var(--border);border-radius:10px;
    flex-wrap:wrap}
  .file-row-left{display:flex;flex-direction:column;gap:3px}
  .file-row-name{font-weight:700;font-size:.9rem;color:#fff}
  .file-row-meta{font-size:.75rem;color:#6b7280}
  .file-row-actions{display:flex;gap:8px;align-items:center}
  .copy-btn{background:rgba(255,85,0,.15);border:1px solid rgba(255,85,0,.3);color:var(--orange);
    font-size:.75rem;font-weight:700;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .2s}
  .copy-btn:hover{background:rgba(255,85,0,.3)}
  .empty{text-align:center;padding:28px;color:#4b5563;font-size:.9rem}
  h4{font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6b7280;margin-bottom:4px}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login">
  <div class="logo">YACHIYO<span>CUP</span></div>
  <p>文件上传管理后台 · 请输入管理密码</p>
  <div class="card">
    <input type="password" id="pwd" placeholder="管理密码" autocomplete="current-password">
    <button class="btn" onclick="doLogin()">🔐 进入后台</button>
    <p id="login-err" style="color:#ef4444;font-size:.82rem;margin-top:10px;display:none">密码错误，请重试</p>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard">
  <!-- Topbar -->
  <div class="topbar">
    <div class="logo">YACHIYO<span>CUP</span> <span style="font-size:.9rem;color:#6b7280;font-weight:400">文件管理</span></div>
    <div style="display:flex;gap:10px;align-items:center">
      <div class="badge"><span class="dot"></span>已认证</div>
      <button class="btn btn-sm" onclick="logout()" style="width:auto">退出</button>
    </div>
  </div>

  <!-- Upload card -->
  <div class="card" style="display:flex;flex-direction:column;gap:16px">
    <h4>上传新文件</h4>

    <!-- Drop zone -->
    <div id="dropzone" onclick="document.getElementById('fileInput').click()"
         ondragover="e=event;e.preventDefault();this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="handleDrop(event)">
      <div class="icon">📦</div>
      <h3>点击选择文件 或 拖拽到此处</h3>
      <p>支持任意大小（自动分片，每片 &lt; 90 MB）</p>
    </div>
    <input type="file" id="fileInput" onchange="startUpload(this.files[0])">

    <!-- Progress -->
    <div id="progress-area">
      <div class="file-info">
        <div>
          <div class="file-name" id="p-name">—</div>
          <div class="file-meta" id="p-size">—</div>
        </div>
        <div class="file-meta" id="p-speed">—</div>
      </div>
      <div class="prog-track"><div class="prog-bar" id="prog-bar"></div></div>
      <div class="prog-label">
        <span id="p-chunk">准备中...</span>
        <span id="p-pct">0%</span>
      </div>
    </div>

    <!-- Status message -->
    <div id="status-msg"></div>

    <!-- Start button -->
    <button class="btn" id="upload-btn" disabled onclick="/* triggered by file select */void 0">选择文件后自动开始上传</button>
  </div>

  <!-- File list card -->
  <div cla  <!-- File list card -->
  <div class="card" style="display:flex;flex-direction:column;gap:14px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h4>已上传文件</h4>
      <button class="btn btn-sm" onclick="loadFiles()">&#x1f504; 刷新</button>
    </div>
    <div id="file-list"><div class="empty">加载中...</div></div>
  </div>

  <!-- Settings card -->
  <div class="card" style="display:flex;flex-direction:column;gap:16px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h4>版本与下载设置</h4>
      <button class="btn btn-sm" onclick="loadSettings()">&#x1f504; 刷新</button>
    </div>
    <p style="font-size:.8rem;color:#6b7280">修改后点「保存」，网站首页的下载按鈕将自动更新。</p>

    <div style="display:flex;flex-direction:column;gap:6px">
      <label style="font-size:.78rem;font-weight:700;color:#9ca3af;letter-spacing:.08em">
        下载链接 <span style="color:#ef4444">*</span>
      </label>
      <div style="display:flex;gap:8px">
        <input type="text" id="s-url" placeholder="https://你的域名/dist/YachiyoCup_v1.exe"
          style="flex:1;padding:10px 14px;background:rgba(255,85,0,.06);border:1px solid rgba(255,85,0,.18);
                 border-radius:8px;color:#fff;font-size:.85rem;outline:none">
        <button class="btn btn-sm" onclick="saveField('download_url','s-url')">&#x1f4be; 保存</button>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:6px">
      <label style="font-size:.78rem;font-weight:700;color:#9ca3af;letter-spacing:.08em">版本号</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="s-ver" placeholder="V2.1.0"
          style="width:180px;padding:10px 14px;background:rgba(255,85,0,.06);border:1px solid rgba(255,85,0,.18);
                 border-radius:8px;color:#fff;font-size:.85rem;outline:none">
        <button class="btn btn-sm" onclick="saveField('download_ver','s-ver')">&#x1f4be; 保存</button>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:6px">
      <label style="font-size:.78rem;font-weight:700;color:#9ca3af;letter-spacing:.08em">文件大小（首页显示用）</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="s-size" placeholder="150 MB"
          style="width:180px;padding:10px 14px;background:rgba(255,85,0,.06);border:1px solid rgba(255,85,0,.18);
                 border-radius:8px;color:#fff;font-size:.85rem;outline:none">
        <button class="btn btn-sm" onclick="saveField('download_size','s-size')">&#x1f4be; 保存</button>
      </div>
    </div>

    <div id="settings-msg" style="display:none;padding:10px 14px;border-radius:8px;font-size:.83rem;font-weight:600"></div>
  </div>

</div>.85rem;outline:none">
        <button class="btn btn-sm" onclick="saveField('download_size','s-size')">&#x1f4be; 保存</button>
      </div>
    </div>

    <div id="settings-msg" style="display:none;padding:10px 14px;border-radius:8px;font-size:.83rem;font-weight:600"></div>
  </div>

</div>
    <div id="file-list"><div class="empty">加载中...</div></div>
  </div>
</div>

<script>
const CHUNK_SIZE = 88 * 1024 * 1024; // 88 MB per chunk
let password = '';
let uploadEndpoint = 'upload.php';

/* ── Login ── */
function doLogin() {
  const p = document.getElementById('pwd').value.trim();
  if (!p) return;
  password = p;
  // Quick auth test
  fetch(uploadEndpoint + '?action=list_files', {
    method: 'POST',
    headers: {'X-Auth': password},
    body: new URLSearchParams({action:'list_files', auth:password})
  })
  .then(r => r.json())
  .then(d => {
    if (d.ok === false && d.msg === '密码错误') {
      document.getElementById('login-err').style.display = 'block';
      password = '';
    } else {
      document.getElementById('login').style.display = 'none';
      document.getElementById('dashboard').style.display = 'flex';
      loadFiles();
    }
  })
  .catch(() => { alert('无法连接到服务器，请检查 upload.php 是否已上传'); });
}
document.getElementById('pwd').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function logout() {
  password = '';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pwd').value = '';
}

/* ── Drag & Drop ── */
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) startUpload(file);
}

/* ── Upload ── */
async function startUpload(file) {
  if (!file) return;
  const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
  const uid = Math.random().toString(36).slice(2) + Date.now().toString(36);

  // UI setup
  document.getElementById('progress-area').style.display = 'flex';
  document.getElementById('status-msg').style.display = 'none';
  document.getElementById('p-name').textContent = file.name;
  document.getElementById('p-size').textContent = (file.size/1048576).toFixed(1) + ' MB · ' + totalChunks + ' 片';
  setProgress(0, totalChunks);

  const startTime = Date.now();
  let uploaded = 0;

  for (let i = 0; i < totalChunks; i++) {
    const start = i * CHUNK_SIZE;
    const chunk = file.slice(start, start + CHUNK_SIZE);

    const fd = new FormData();
    fd.append('action',      'upload_chunk');
    fd.append('auth',        password);
    fd.append('uid',         uid);
    fd.append('chunk_index', i);
    fd.append('chunk_total', totalChunks);
    fd.append('filename',    file.name);
    fd.append('chunk',       chunk, file.name);

    let res;
    try {
      const resp = await fetch(uploadEndpoint, {
        method: 'POST',
        headers: {'X-Auth': password},
        body: fd
      });
      res = await resp.json();
    } catch(err) {
      showMsg('❌ 网络错误（分片 ' + (i+1) + '）: ' + err.message, false);
      return;
    }

    if (!res.ok) { showMsg('❌ ' + res.msg, false); return; }

    uploaded += chunk.size;
    const elapsed = (Date.now() - startTime) / 1000;
    const speed = (uploaded / 1048576 / elapsed).toFixed(1);
    document.getElementById('p-speed').textContent = speed + ' MB/s';
    setProgress(i + 1, totalChunks);

    if (res.done) {
      showMsg('✅ 上传成功！' + res.filename + '（' + res.size_mb + ' MB）\n下载路径: ' + res.url, true);
      loadFiles();
      document.getElementById('fileInput').value = '';
      return;
    }
  }
}

function setProgress(done, total) {
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('p-pct').textContent = pct + '%';
  document.getElementById('p-chunk').textContent = '分片 ' + done + ' / ' + total;
}

function showMsg(msg, ok) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = ok ? 'msg-ok' : 'msg-err';
  el.style.display = 'block';
}

/* ── File List ── */
function loadFiles() {
  fetch(uploadEndpoint, {
    method: 'POST',
    headers: {'X-Auth': password},
    body: new URLSearchParams({action:'list_files', auth:password})
  })
  .then(r => r.json())
  .then(d => {
    const el = document.getElementById('file-list');
    if (!d.files || d.files.length === 0) {
      el.innerHTML = '<div class="empty">暂无已上传文件</div>';
      return;
    }
    el.innerHTML = d.files.map(f => `
      <div class="file-row">
        <div class="file-row-left">
          <div class="file-row-name">📦 ${f.name}</div>
          <div class="file-row-meta">${f.size_mb} MB · ${f.modified}</div>
        </div>
        <div class="file-row-actions">
          <button class="copy-btn" onclick="copyURL('${location.origin + location.pathname.replace('uploader.html','') + f.url}')">📋 复制链接</button>
          <button class="btn btn-sm btn-del" onclick="delFile('${f.name}')">🗑 删除</button>
        </div>
      </div>`).join('');
  });
}

function copyURL(url) {
  navigator.clipboard.writeText(url).then(() => alert('✅ 链接已复制！\n' + url));
}

function delFile(name) {
  if (!confirm('确认删除 ' + name + '？')) return;
  fetch(uploadEndpoint, {
    method: 'POST',
    headers: {'X-Auth': password},
    body: new URLSearchParams({action:'delete_file', auth:password, name})
  }).then(r => r.json()).then(d => { alert(d.msg); loadFiles(); });
}
/* ── Settings ── */
function loadSettings() {
  fetch(uploadEndpoint, {
    method:'POST', headers:{'X-Auth':password},
    body: new URLSearchParams({action:'get_settings', auth:password})
  }).then(r=>r.json()).then(d=>{
    if (!d.ok) { console.warn(d.msg); return; }
    const s = d.settings || {};
    if (s.download_url)  document.getElementById('s-url').value  = s.download_url;
    if (s.download_ver)  document.getElementById('s-ver').value  = s.download_ver;
    if (s.download_size) document.getElementById('s-size').value = s.download_size;
  }).catch(()=>{});
}

function saveField(key, inputId) {
  const val = document.getElementById(inputId).value.trim();
  if (!val) { showSettingsMsg('请先填写内容', false); return; }
  fetch(uploadEndpoint, {
    method:'POST', headers:{'X-Auth':password},
    body: new URLSearchParams({action:'update_setting', auth:password, key, value:val})
  }).then(r=>r.json()).then(d=>{
    showSettingsMsg(d.msg, d.ok);
  });
}

function showSettingsMsg(msg, ok) {
  const el = document.getElementById('settings-msg');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = ok ? 'rgba(34,197,94,.1)' : 'rgba(239,68,68,.1)';
  el.style.border = ok ? '1px solid rgba(34,197,94,.3)' : '1px solid rgba(239,68,68,.3)';
  el.style.color = ok ? '#22c55e' : '#ef4444';
  setTimeout(()=>{ el.style.display='none'; }, 3000);
}
</script>
</body>
